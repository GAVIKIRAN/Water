<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Water Quality Prediction</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(270deg,#00c6ff,#0072ff,#00f2fe);
    background-size: 600% 600%;
    animation: waterFlow 10s ease infinite;
    text-align: center;
    color: white;
}
@keyframes waterFlow {
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
.container {
    background: rgba(255,255,255,0.95);
    color: black;
    width: 350px;
    margin: 80px auto;
    padding: 20px;
    border-radius: 15px;
}
input {
    width: 90%;
    padding: 10px;
    margin: 8px;
    border-radius: 8px;
}
button {
    background: #0072ff;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
}
#result {
    margin-top: 15px;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>💧 Water Quality Prediction</h1>

<div class="container">
    <input type="number" id="ph" placeholder="pH"><br>
    <input type="number" id="turbidity" placeholder="Turbidity"><br>
    <input type="number" id="tds" placeholder="TDS"><br>
    <input type="number" id="hardness" placeholder="Hardness"><br>
    <input type="number" id="temperature" placeholder="Temperature"><br>

    <button onclick="predict()">Predict</button>

    <div id="result"></div>
</div>

<script>
function predict(){
    let ph = document.getElementById("ph").value;
    let turbidity = document.getElementById("turbidity").value;
    let tds = document.getElementById("tds").value;
    let hardness = document.getElementById("hardness").value;
    let temperature = document.getElementById("temperature").value;

    if(!ph || !turbidity || !tds || !hardness || !temperature){
        document.getElementById("result").innerHTML="⚠️ Enter all values";
        return;
    }

    fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            ph: ph,
            turbidity: turbidity,
            tds: tds,
            hardness: hardness,
            temperature: temperature
        })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("result").innerHTML = data.result;
    })
    .catch(error => {
        document.getElementById("result").innerHTML = "❌ Error connecting backend";
    });
}
</script>

</body>
</html>
